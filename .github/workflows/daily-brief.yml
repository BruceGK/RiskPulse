name: Daily Analyst Desk

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/daily-brief.yml"
  schedule:
    # 13:45 UTC is 9:45am New York during US daylight saving time.
    - cron: "45 13 * * 1-5"
  workflow_dispatch:

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Warm daily brief cache
        shell: bash
        env:
          RISKPULSE_API_URL: ${{ vars.RISKPULSE_API_URL }}
          RISKPULSE_PUBLIC_URL: ${{ vars.RISKPULSE_PUBLIC_URL }}
          RISKPULSE_STRICT_WARMUP: ${{ vars.RISKPULSE_STRICT_WARMUP }}
        run: |
          set -u
          for cmd in curl date sleep head cat; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "Required command '$cmd' is unavailable on this runner."
              exit 1
            fi
          done

          PUBLIC_FALLBACK_URL="${RISKPULSE_PUBLIC_URL:-https://red-hill-09659e10f.6.azurestaticapps.net}"
          if [ -z "${RISKPULSE_API_URL:-}" ]; then
            BASE_URL="${PUBLIC_FALLBACK_URL%/}"
            echo "::warning::RISKPULSE_API_URL is not set. Using public fallback URL: $BASE_URL"
          else
            BASE_URL="${RISKPULSE_API_URL%/}"
          fi
          if [[ "$BASE_URL" == *".azurecontainerapps.io"* ]]; then
            echo "::warning::RISKPULSE_API_URL is pointing at the Container App. Using public Static Web App URL for scheduled warmups instead."
            BASE_URL="${PUBLIC_FALLBACK_URL%/}"
          fi
          echo "Warming RiskPulse scheduled endpoints through: $BASE_URL"

          warm_endpoint() {
            NAME="$1"
            ENDPOINT_PATH="$2"
            OUT="/tmp/riskpulse-${NAME}.json"
            URL="$BASE_URL$ENDPOINT_PATH"
            ATTEMPT=1
            MAX_ATTEMPTS=4
            SLEEP_SECONDS=20

            while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
              echo "::group::Warm $NAME attempt $ATTEMPT/$MAX_ATTEMPTS"
              START_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              STATUS=$(curl --fail-with-body --connect-timeout 15 --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors -sS -o "$OUT" -w "%{http_code}" "$URL" || true)
              END_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "$NAME HTTP status: ${STATUS:-curl-error}"
              echo "$NAME started: $START_TS"
              echo "$NAME ended: $END_TS"

              if [ "$STATUS" = "401" ]; then
                echo "$NAME warm-up received 401."
                echo "RISKPULSE_API_URL should be the public Static Web App URL, not the protected Container App URL."
                echo "Example: https://red-hill-09659e10f.6.azurestaticapps.net"
                cat "$OUT" || true
                echo "::endgroup::"
                return 1
              fi

              if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
                echo "$NAME warmed successfully."
                head -c 500 "$OUT" || true
                echo
                echo "::endgroup::"
                return 0
              fi

              echo "$NAME warm-up failed with HTTP ${STATUS:-curl-error}."
              cat "$OUT" || true
              echo "::endgroup::"

              if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                echo "Waiting ${SLEEP_SECONDS}s before retrying $NAME..."
                sleep "$SLEEP_SECONDS"
              fi
              ATTEMPT=$((ATTEMPT + 1))
              SLEEP_SECONDS=$((SLEEP_SECONDS * 2))
            done

            echo "$NAME failed after $MAX_ATTEMPTS attempts."
            return 1
          }

          FAILED=0
          warm_endpoint "daily-brief" "/api/daily-brief?force=true" || FAILED=1
          warm_endpoint "agent" "/api/agent?force=true" || FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            echo "::warning::One or more Daily Analyst Desk warm-up endpoints failed."
            if [ "${RISKPULSE_STRICT_WARMUP:-false}" = "true" ]; then
              echo "RISKPULSE_STRICT_WARMUP=true, failing the workflow."
              exit 1
            fi
            echo "Warm-up failures are warning-only. The live app can still be healthy while backend deployment or provider calls are settling."
            exit 0
          fi

          echo "Daily Analyst Desk warm-up completed."
