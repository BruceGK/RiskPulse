version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: riskpulse-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    container_name: riskpulse-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
